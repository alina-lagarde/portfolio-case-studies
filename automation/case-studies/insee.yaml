context:
  separate_callouts: true
  title_fr: Concevoir une plateforme digitale avec une approche centrée utilisateurs.
  title_en: Designing a digital platform with a user-centered approach.
  title_fr_html: Concevoir une plateforme digitale<br>avec une approche centrée utilisateurs.
  title_en_html: Designing a digital platform<br>with a user-centered approach.
  paragraphs_fr_html:
    - Dans le cadre de la refonte des intranets et des outils de communication interne, l'INSEE a sollicité un accompagnement pour concevoir une plateforme digitale selon une approche centrée utilisateurs.
    - Avec un planneur stratégique, nous avons recueilli les enjeux et risques du projet à travers <strong>un atelier et 5 interviews de parties prenantes</strong>. Un recueil des usages des différents métiers a également été mené au moyen de <strong>42 interviews utilisateurs</strong>.
  paragraphs_en_html:
    - As part of the redesign of its intranets and internal communication tools, INSEE requested support to design a digital platform using a user-centered approach.
    - Working with a strategic planner, we collected project challenges and risks through <strong>one workshop and 5 stakeholder interviews</strong>. Research into practices across different roles was also conducted through <strong>42 user interviews</strong>.
  challenge_fr: Faire converger la vision stratégique des parties prenantes avec les usages et besoins réels des agents INSEE.
  challenge_en: Bring stakeholder strategic vision together with the real practices and needs of INSEE staff.
  callout_fr:
    - label: Problématique client.
      text: Faire converger la vision stratégique des parties prenantes avec les usages et besoins réels des agents INSEE, tout en adaptant la méthodologie UX au milieu administratif.
    - label: Contraintes.
      text: "Accès aux agents en milieu administratif complexe à organiser : grand panel de métiers avec rotation interne fréquente, disponibilités limitées. Réconcilier une vision stratégique portée par la hiérarchie avec des usages terrain parfois très éloignés ; sans que les uns invalident les autres."
  callout_en:
    - label: Client question.
      text: Bring stakeholder strategic vision together with the real practices and needs of INSEE staff, while adapting UX methodology to an administrative environment.
    - label: Constraints.
      text: "Access to staff in an administrative environment was complex to organize: a wide range of professional roles with frequent internal rotation and limited availability. Reconciling a top-down strategic vision with field practices that sometimes diverged significantly ; without letting either invalidate the other."

objective_fr: Recueillir les enjeux et risques, écouter les usages agents et faire émerger des propositions de solution.
objective_en: Collect challenges and risks, listen to staff practices and support the emergence of solution proposals.
constraints_fr: Accès complexe aux agents · métiers nombreux · disponibilités limitées · vision stratégique à réconcilier avec les usages terrain.
constraints_en: Complex staff access · many professional roles · limited availability · strategic vision to reconcile with field practices.


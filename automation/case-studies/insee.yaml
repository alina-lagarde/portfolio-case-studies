approach:
  title_fr: Une conception structurée en trois phases.
  title_en: A design process structured in three phases.
  title_fr_html: Une conception structurée en trois phases.
  title_en_html: A design process structured in three phases.
  intro_fr: Le PDF documente une première phase d'analyse de l'existant et de compréhension de la vision des parties prenantes, une deuxième phase de compréhension des besoins utilisateurs, puis une phase de proposition de solution fondée sur la co-création, les études et les usages recueillis. La deuxième phase avait été entamée fin juin 2019.
  intro_en: The PDF documents a first phase analyzing the existing situation and understanding stakeholder vision, a second phase understanding user needs, and a solution-proposal phase based on co-creation, related studies and collected practices. The second phase had begun in late June 2019.

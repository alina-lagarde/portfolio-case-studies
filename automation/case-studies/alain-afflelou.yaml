impact:
  before_fr: Aucun outil, processus ou référentiel product design partagé chez Afflelou Digital.
  before_en: No shared product design tooling, process, or reference inside Afflelou Digital.
  decision_fr: Construire les outils, rituels, handoffs et compétences internes tout en livrant les parcours e-commerce.
  decision_en: Build shared tools, rituals, handoffs, and internal capabilities while shipping the e-commerce journeys.
  effect_fr: >-
    À la fin de la mission, l'équipe disposait d'une référence design commune, d'outils
    réutilisables, de rituels de production et de personnes capables de poursuivre la
    pratique.
  effect_en: >-
    At the end of the mission, the team had a shared design reference, reusable tooling,
    production rituals, and people able to keep the practice moving.
  title_fr: De zéro pratique design à une équipe interne opérationnelle.
  title_en: From zero design practice to an operational internal team.
  title_fr_html: De zéro pratique design<br>à une équipe interne opérationnelle.
  title_en_html: From zero design practice<br>to an operational internal team.
  paragraphs_fr:
    - >-
      À la fin de la mission, l'équipe disposait d'une référence design commune, d'outils
      réutilisables, de rituels de production et de personnes capables de poursuivre la
      pratique.
    - >-
      Le signal le plus fort que les fondations ont tenu : après la période de clause
      contractuelle, Afflelou est revenu directement - sans passer par une agence - pour
      finaliser les parcours et les handoffs UI. La pratique a tenu sans la designer
      d'origine.
  paragraphs_en:
    - >-
      At the end of the mission, the team had a shared design reference, reusable tooling,
      production rituals, and people able to keep the practice moving.
    - >-
      The strongest signal that the foundation held: after the contractual clause period,
      Afflelou came back directly - without going through an agency - to finalize the
      design system and UI handoffs. The practice ran without the original designer.

takeaway_fr:
  - text: >-
      Commencer par du nettoyage UI et du quick-and-dirty ressemblait à un déclassement -
      un travail qu'un junior aurait pu faire. Il a fallu du temps pour comprendre ce que
      c'était vraiment : la seule porte d'entrée. Dans une organisation sans culture design,
      on gagne de la portée stratégique en livrant d'abord sur le quotidien. Le pôle design
      n'est pas arrivé malgré le travail de nettoyage - il est arrivé grâce à lui.
  - text: >-
      Je l'intègre maintenant explicitement dans le cadrage des missions embarquées : le
      premier mois achète les six suivants.
    highlight: true
takeaway_en:
  - text: >-
      Starting with UI cleanup and quick-and-dirty fixes felt like a step down - work a
      junior could handle. It took time to see it for what it was: the only way in. In an
      organization with no design culture, you earn strategic scope by delivering on the
      mundane first. The design studio didn't happen despite the cleanup work - it happened
      because of it.
  - text: >-
      I now factor this in explicitly when scoping embedded missions: the first month buys
      the next six.
    highlight: true


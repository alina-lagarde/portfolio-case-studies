context:
  title_fr: Passer d'un modèle franchisé à des produits digitaux omnicanaux.
  title_en: From a franchise-first business to omnichannel digital products.
  title_fr_html: Passer d'un modèle franchisé<br>à des produits digitaux omnicanaux.
  title_en_html: From a franchise-first business<br>to omnichannel digital products.
  paragraphs_fr:
    - >-
      Alain Afflelou est une marque historique de l'optique française avec une présence
      internationale, mais un modèle économique construit autour de la franchise plutôt
      que du commerce digital. L'équipe avait besoin d'accélérer : lancer l'e-commerce
      optique, ajouter un abonnement de lentilles et refondre Malentille.com.
    - >-
      La mission consistait aussi à construire la pratique design qui n'existait pas
      encore : poser les outils, les rituels, les références communes et les compétences
      nécessaires pour maintenir une qualité constante sur plusieurs lignes métier.
  paragraphs_en:
    - >-
      Alain Afflelou is one of France's historic optics brands with an international
      footprint, but a business model built on franchises rather than digital commerce.
      The digital team needed to accelerate: launch optical e-commerce, add a contact
      lens subscription, and replatform Malentille.com.
    - >-
      The mission also meant building the design practice that did not yet exist:
      establishing the tools, rituals, shared references, and skills needed to keep
      design quality consistent across several business lines.
  challenge_fr: >-
    La stratégie et les priorités du management ont changé plusieurs fois pendant la mission.
    Il fallait rester productive et maintenir la qualité design malgré les pivots fréquents,
    sans culture design préexistante pour stabiliser les décisions.
  challenge_en: >-
    Management strategy and priorities shifted repeatedly throughout the mission. Staying
    productive and keeping design quality consistent while adapting to frequent pivots,
    without an established design culture to anchor decisions, was the defining constraint.

objective_fr: >-
  Lancer l'e-commerce optique, construire le parcours d'abonnement aux lentilles et
  mettre en place une équipe product design opérationnelle.
objective_en: >-
  Launch optical e-commerce, build a contact lens subscription flow, and stand up a
  functioning product design team.
constraints_fr: >-
  Modèle centré franchises · prestataires externes · aucun outil ni culture design en
  place · pivots fréquents du management.
constraints_en: >-
  Franchise-first business model · external providers · no existing design tooling or
  culture · frequent management pivots.

approach:
  title_fr: Une pratique design itérative intégrée au cycle de livraison.
  title_en: An iterative design practice embedded inside the delivery cycle.
  title_fr_html: Une pratique design itérative intégrée<br>au cycle de livraison.
  title_en_html: An iterative design practice embedded<br>inside the delivery cycle.
  intro_fr: >-
    Il n'y avait pas de budget important pour une étude amont. L'approche reposait sur
    un apprentissage qualitatif continu : audit, tests légers, co-design, production et
    rituels de transmission utilisables après la mission.
  intro_en: >-
    There was no large upfront research budget. The approach relied on continuous
    qualitative learning: audit, lightweight user testing, co-design, production, and
    handoff rituals that could remain useful after the mission.
  steps:
    - step: "01"
      title_fr: Audit et cadrage
      title_en: Audit and scoping
      text_fr: >-
        Audit UI/UX, cartographie des parties prenantes, cadrage des besoins et mise en
        place de l'espace collaboratif.
      text_en: >-
        UI/UX audit, stakeholder mapping, needs framing, and collaborative workspace setup.
    - step: "02"
      title_fr: Recherche utilisateur
      title_en: User research
      text_fr: >-
        Tests guerilla, synthèse, études Testapic et boucle continue tester-apprendre-itérer.
      text_en: >-
        Guerilla tests, synthesis, Testapic studies, and a continuous test-learn-iterate loop.
    - step: "03"
      title_fr: Co-design et production
      title_en: Co-design and production
      text_fr: >-
        Ateliers, wireframes, maquettes haute fidélité, prototypes, faisabilité, roadmap et
        UX writing.
      text_en: >-
        Workshops, wireframes, high-fidelity mockups, prototypes, feasibility checks,
        roadmap input, and UX writing.
    - step: "04"
      title_fr: Design Ops
      title_en: Design Ops
      text_fr: >-
        Migration Figma, UI Kit, design system réutilisable, recrutement, coaching et montée
        en compétences.
      text_en: >-
        Figma migration, UI Kit, reusable design system, recruitment, coaching, and team
        upskilling.
    - step: "05"
      title_fr: Transmission et acculturation
      title_en: Handoff and acculturation
      text_fr: >-
        Handoff aux équipes et prestataires, évangélisation UX et coaching du management
        intermédiaire.
      text_en: >-
        Handover to internal teams and providers, UX evangelization, and coaching for
        middle management.
  tools_fr: Figma · Miro · Google Analytics · Trello · Google Suite · Teams
  tools_en: Figma · Miro · Google Analytics · Trello · Google Suite · Teams


  title_fr_html: Structurer une trajectoire produit progressive
  title_en_html: Structuring an incremental product trajectory
  lead_fr: Passer d'un débat de périmètre à une trajectoire MVP séquencée, testable et validée en comité.
  lead_en: Moving from a scope debate to a sequenced, testable MVP trajectory validated in steering committee.

context:
  title_fr: Faire converger deux écosystèmes sans big bang.
  title_en: Converging two ecosystems without a big bang.
  paragraphs_fr:
    - Orange et Sosh partageaient des enjeux d'assistance digitale, mais leurs parcours, leurs contraintes SEO et leurs logiques de contact ne pouvaient pas être fusionnés en une seule fois sans risque.
    - La mission a consisté à clarifier le périmètre MVP, documenter les exclusions, structurer des hypothèses de test et aligner l'équipe cœur sur une trajectoire V01 -> V02.
  paragraphs_en:
    - Orange and Sosh shared digital support challenges, but their journeys, SEO constraints and contact logic could not be merged all at once without risk.
    - The mission clarified the MVP scope, documented exclusions, structured test hypotheses and aligned the core team on a V01 -> V02 trajectory.
  challenge_fr: Réduire le risque de mutualisation avant tout développement, tout en gardant l'équipe alignée sur une vision commune.
  challenge_en: Reduce consolidation risk before development while keeping the team aligned on a shared vision.

objective_fr: Prioriser le périmètre MVP, séquencer la convergence Orange/Sosh et structurer les hypothèses de test.
objective_en: Prioritise the MVP scope, sequence Orange/Sosh convergence and structure test hypotheses.
constraints_fr: Divergence initiale sur le périmètre · enjeux SEO · articulation chatbot Djingo · risque de big bang produit.
constraints_en: Initial scope disagreement · SEO stakes · Djingo chatbot articulation · product big-bang risk.

approach:
  title_fr: Une trajectoire cadrée par briques, tests et arbitrages.
  title_en: A trajectory framed through building blocks, tests and trade-offs.
  intro_fr: La mission a combiné cadrage produit, ateliers de priorisation, formalisation des exclusions et cartes de test pour transformer un débat conceptuel en trajectoire actionnable.
  intro_en: The mission combined product framing, prioritisation workshops, documented exclusions and test cards to turn a conceptual debate into an actionable trajectory.
  tools_fr: Ateliers · Priorisation MVP · Cartes de test · KPIs · Comité de pilotage
  tools_en: Workshops · MVP prioritisation · Test cards · KPIs · Steering committee
  steps:
    - step: "01"
      title_fr: Clarifier le périmètre
      title_en: Clarify scope
      text_fr: Aligner l'équipe cœur sur les briques à inclure, à exclure et à reporter.
      text_en: Align the core team on what to include, exclude and defer.
    - step: "02"
      title_fr: Séquencer la trajectoire
      title_en: Sequence the trajectory
      text_fr: Transformer une convergence en big bang en deux incréments V01 -> V02.
      text_en: Turn a big-bang convergence into two V01 -> V02 increments.
    - step: "03"
      title_fr: Structurer les tests
      title_en: Structure tests
      text_fr: Formaliser 5 cartes de test avec hypothèses, KPIs et critères de décision.
      text_en: Formalise 5 test cards with hypotheses, KPIs and decision criteria.


results:
  title_fr: Du débat de périmètre à une trajectoire produit maîtrisée.
  title_en: From scope debate to a controlled product trajectory.
  blocks_fr:
    - title: Court terme
      text: Périmètre MVP priorisé et livré en 6 briques structurantes ; décisions d'exclusion aussi documentées que les inclusions.
    - title: Moyen terme
      text: Convergence progressive et testée entre Orange et Sosh, avec une meilleure articulation SEO, chatbot Djingo et parcours de contact.
  blocks_en:
    - title: Short-term
      text: MVP scope prioritised and delivered across 6 structural building blocks; exclusion decisions as documented as inclusions.
    - title: Medium-term
      text: Progressive, tested convergence between Orange and Sosh, with better articulation between SEO, Djingo chatbot and the contact journey.

key_outcomes_fr:
  - label: Court terme
    text: Périmètre MVP priorisé, équipe cœur alignée sur V01 -> V02, risque de mutualisation réduit avant développement.
  - label: Moyen terme
    text: Convergence progressive Orange/Sosh, articulation SEO/Djingo/contact, décisions fondées sur 5 cartes de test avec KPIs.
key_outcomes_en:
  - label: Short-term
    text: Prioritised MVP scope, core team aligned on V01 -> V02, consolidation risk reduced before development.
  - label: Medium-term
    text: Progressive Orange/Sosh convergence, SEO/Djingo/contact articulation, decisions grounded in 5 test cards with KPIs.

impact:
  style: flow
  title_fr: Impact
  title_en: Impact
  before_fr: Le point de départ était un débat conceptuel sur le périmètre et une convergence envisagée comme un big bang.
  before_en: The starting point was a conceptual scope debate and a convergence initially envisioned as a big bang.
  decision_fr: La convergence Orange/Sosh a été reséquencée en deux incréments testables.
  decision_en: Orange/Sosh convergence was resequenced into two testable increments.
  effect_fr: Le projet est devenu une trajectoire produit maîtrisée et validée en comité, sans rouvrir les arbitrages à chaque étape.
  effect_en: The project became a controlled product trajectory validated in steering committee, without reopening trade-offs at every stage.
  cards_fr:
    - label: Avant
      title: Un débat de périmètre
      text: Le point de départ était un débat conceptuel sur le périmètre et une convergence envisagée comme un big bang.
    - label: Décision
      title: Deux incréments testables
      text: La convergence Orange/Sosh a été reséquencée en V01 puis V02, avec des exclusions documentées autant que les inclusions.
    - label: Effet
      title: Une trajectoire validée
      text: Le comité a validé une trajectoire maîtrisée, mesurable et partageable par toute l'équipe.
  cards_en:
    - label: Before
      title: A scope debate
      text: The starting point was a conceptual scope debate and a convergence initially envisioned as a big bang.
    - label: Decision
      title: Two testable increments
      text: Orange/Sosh convergence was resequenced into V01 then V02, with exclusions documented as carefully as inclusions.
    - label: Effect
      title: A validated trajectory
      text: The steering committee validated a controlled, measurable trajectory that the full team could share.

takeaway_fr:
  - "Je n'ai pas corrigé les angles morts de l'équipe frontalement. J'ai construit un processus qui permettrait à la réalité d'émerger d'elle-même. C'est ça que je ne sais pas mettre dans un portfolio."
takeaway_en:
  - "I didn't correct the team's blind spots head-on. I built a process that would let reality surface on its own. That's what I don't know how to put in a portfolio."


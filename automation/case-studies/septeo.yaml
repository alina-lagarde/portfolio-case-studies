impact:
  style: flow
  title_fr: Des flux cibles aux écarts de développement.
  title_en: From target flows to development gaps.
  title_fr_html: Des flux cibles aux écarts de développement.
  title_en_html: From target flows to development gaps.
  before_fr: Le logiciel couvrait une partie du périmètre, mais les écarts restants devaient être objectivés à partir des flux métiers cibles.
  before_en: The software covered part of the scope, but remaining gaps had to be objectified through target business workflows.
  decision_fr: Les flux cartographiés ont permis de croiser besoins métier, fonctionnalités existantes et candidats à l'automatisation IA.
  decision_en: The mapped flows made it possible to cross-reference business needs, existing features and AI automation candidates.
  effect_fr: Les équipes produit ont pu prioriser à l'échelle des workflows, pas sous forme de demandes abstraites. Pas de retour sur l'implémentation à ce stade.
  effect_en: Product teams could prioritize at workflow level, not through abstract feature requests. No follow-up on implementation received since delivery.
  cards_fr:
    - label: Avant
      title: Un produit acquis à confronter au terrain
      text: Le logiciel couvrait une partie du périmètre, mais les écarts restants devaient être objectivés à partir des flux métiers cibles.
    - label: Décision
      title: Des fiches synthèse actionnables
      text: Les flux cartographiés ont permis de croiser besoins métier, fonctionnalités existantes et candidats à l'automatisation IA.
    - label: Effet
      title: Une priorisation plus opérationnelle
      text: Les équipes produit ont pu prioriser à l'échelle des workflows, pas sous forme de demandes abstraites. Pas de retour sur l'implémentation à ce stade.
  cards_en:
    - label: Before
      title: An acquired product to confront with field reality
      text: The software covered part of the scope, but remaining gaps had to be objectified through target business workflows.
    - label: Decision
      title: Actionable summary cards
      text: The mapped flows made it possible to cross-reference business needs, existing features and AI automation candidates.
    - label: Effect
      title: More operational prioritization
      text: Product teams could prioritize at workflow level, not through abstract feature requests. No follow-up on implementation received since delivery.

takeaway_fr:
  - text: Séparer la cartographie de l'existant, menée avec les équipes métier et produit, de la phase prospective, menée avec davantage d'utilisateurs finaux, aurait rendu les deux exercices plus efficaces.
  - text: Une session d'interviews métier en amont, même courte, aurait réduit significativement le temps de montée en contexte. Ce sont des points de cadrage à intégrer systématiquement dans les prochaines propositions.
    highlight: true
takeaway_en:
  - text: Separating existing-state mapping with business and product teams from the prospective phase with more end users would have made both exercises more effective.
  - text: A short upfront business interview session would have significantly reduced context-building time. These are framing points to integrate systematically into future proposals.
    highlight: true


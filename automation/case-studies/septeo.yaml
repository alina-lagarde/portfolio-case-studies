results:
  layout: flow_maps
  title_fr: Des décisions exploitables pour la roadmap IA-centric.
  title_en: Directly usable input for an AI-centric roadmap.
  title_fr_html: Des décisions exploitables pour la roadmap IA-centric.
  title_en_html: Directly usable input for an AI-centric roadmap.
  flow_maps_label_fr: Cartes de flux métiers cibles
  flow_maps_label_en: Target business flow maps
  items_fr:
    - label: Résultat 01
      title: Jobs-to-be-done métier
      text: Cartographie exhaustive de tous les jobs-to-be-done métier pour la gestion locative et les syndics (partie comptable) ; base commune construite avec les utilisateurs finaux avant toute contrainte outil.
    - label: Résultat 02
      title: 4 flux prioritaires cartographiés
      text: "4 flux prioritaires (critiques et récurrents) cartographiés en détail via Event Storming : événements, commandes, acteurs, systèmes, règles, hotspots et opportunités d'innovation ; restitués en fiches synthèse actionnables avec candidats à l'automatisation IA flux par flux."
    - label: Résultat 03
      title: Priorisation terrain
      text: Priorisation et pitch des évolutions majeures effectués par les administrateurs de biens via dot voting ; décisions de roadmap ancrées dans le terrain, pas dans les hypothèses produit.
  items_en:
    - label: Result 01
      title: Business jobs-to-be-done
      text: Full mapping of business jobs-to-be-done across rental management and co-ownership (accounting scope) ; shared foundation built with end users before any tool constraint.
    - label: Result 02
      title: 4 priority flows mapped
      text: "4 priority flows (critical and recurring) mapped in detail via Event Storming: events, commands, actors, systems, rules, hotspots and innovation opportunities ; delivered as actionable summary cards with AI automation candidates identified step by step."
    - label: Result 03
      title: Field-grounded prioritization
      text: Major workflow improvements prioritized and pitched by property managers via dot voting ; roadmap decisions grounded in field reality, not product assumptions.

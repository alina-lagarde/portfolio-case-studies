approach:
  title_fr: 5 étapes par jour - du contexte brut à une entrée de roadmap IA.
  title_en: 5 stages per day - from raw context to AI-ready roadmap input.
  title_fr_html: 5 étapes par jour - du contexte brut à une entrée de roadmap IA.
  title_en_html: 5 stages per day - from raw context to AI-ready roadmap input.
  intro_fr: Chaque atelier suivait une progression structurée, de la construction collective du contexte à des livrables actionnables. La dimension prospective, imaginer les flux cibles sans contrainte de l'outil actuel, était intégrée à la phase 4 avec un focus sur les candidats à l'automatisation ou à l'assistance IA.
  intro_en: Each workshop followed a structured arc, moving from collective sense-making to concrete actionable outputs. The prospective dimension - imagining target flows unconstrained by the current tool - was embedded in stage 4, with a focus on identifying candidates for AI automation or assistance.
  intro_fr_html: Chaque atelier suivait une progression structurée, de la construction collective du contexte à des livrables actionnables. La dimension <strong>prospective</strong>, imaginer les flux cibles sans contrainte de l'outil actuel, était intégrée à la phase 4 avec un focus sur les candidats à <strong>l'automatisation ou à l'assistance IA.</strong>
  intro_en_html: Each workshop followed a structured arc, moving from collective sense-making to concrete actionable outputs. The <strong>prospective dimension</strong> - imagining target flows unconstrained by the current tool - was embedded in stage 4, with a focus on identifying candidates for <strong>AI automation or assistance.</strong>
  show_tools_line: false
  tools_fr: Event Storming · JTBD · Dot voting
  tools_en: Event Storming · JTBD · Dot voting
  steps:
    - step: "01"
      title_fr: Introduction et icebreaker
      title_en: Intro and icebreaker
      text_fr: Objectifs, règles de co-création et alignement du groupe.
      text_en: Objectives, co-creation rules, getting the room aligned.
    - step: "02"
      title_fr: Jobs to be done et macro-flux
      title_en: Jobs-to-be-done and macro flows
      text_fr: Identifier les JTBD et les traduire en flux métiers candidats.
      text_en: Identifying JTBDs, translating into business flow candidates.
    - step: "03"
      title_fr: Priorisation par vote
      title_en: Prioritization by vote
      text_fr: Vote des utilisateurs finaux pour classer les flux selon leur impact terrain.
      text_en: End users only - dot voting to rank flows by real-world impact.
    - step: "04"
      title_fr: Event Storming en sous-groupes
      title_en: Event Storming in sub-groups
      text_fr: Événements, commandes, acteurs, systèmes, règles, hotspots et idées IA.
      text_en: Events, commands, actors, systems, rules, hotspots and AI ideas.
    - step: "05"
      title_fr: Pitch et débrief collectif
      title_en: Plenary pitch and debrief
      text_fr: Présentation de chaque sous-groupe et rétrospective à chaud.
      text_en: Each sub-group presents - hot retrospective with all participants.


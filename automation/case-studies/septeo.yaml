context:
  title_fr: Un écart post-acquisition à combler, une vision IA-centric à définir.
  title_en: A post-acquisition gap to close, an AI-centric vision to define.
  title_fr_html: Un écart post-acquisition à combler,<br>une vision IA-centric à définir.
  title_en_html: A post-acquisition gap to close,<br>an AI-centric vision to define.
  paragraphs_fr_html:
    - >-
      Septeo-ADB, leader français des logiciels pour administrateurs de biens
      <strong>(3 200 agences, 150 000 utilisateurs)</strong>, venait d'acquérir un
      nouveau produit comptable pour consolider ses deux métiers clés : la gestion
      de copropriété <strong>(Syndic)</strong> et la gestion locative.
    - "Le produit acquis couvrait environ <strong>90 % du périmètre Syndic, mais seulement 50 à 60 % de la gestion locative</strong>. L'objectif : définir des flux métiers cibles indépendamment des outils existants, identifier les fonctionnalités manquantes et prioriser le développement dans une logique « IA-centric »."
  paragraphs_en_html:
    - >-
      Septeo-ADB, the French market leader in property management software
      <strong>(3,200 agencies, 150,000 users)</strong>, had just acquired a new
      accounting product to consolidate both its core domains: co-ownership management
      <strong>(Syndic)</strong> and rental management.
    - "The acquired product covered approximately <strong>90% of the Syndic scope but only 50-60% of rental management</strong>. The goal: define target business workflows independently of existing tools, identify missing features, and prioritize development in an \"AI-centric\" logic."
  challenge_fr: Les interviews utilisateurs avaient été refusées pour des raisons budgétaires ; la connaissance métier initiale était minimale.
  challenge_en: User interviews had been refused for budget reasons; initial domain knowledge was minimal.
  callout_fr:
    - label: Le véritable défi.
      text: "Les interviews utilisateurs avaient été refusées pour des raisons budgétaires : nous sommes arrivées avec une connaissance métier minimale. L'interlocuteur client était peu familier des approches centrées utilisateur."
    - label: Pivot au premier jour.
      text: Les deux ateliers étaient initialement conçus selon la même structure. Dès la première matinée, les cas d'usage Syndic et Gestion locative se sont révélés nettement différents. Le programme du second atelier a été revu en fin de première journée, avec les participants métier présents sur les deux sessions.
  callout_en:
    - label: The real challenge.
      text: User interviews had been refused for budget reasons - we arrived with minimal domain knowledge. The client contact was unfamiliar with user-centered approaches.
    - label: Day one pivot.
      text: The two workshops were initially identical in structure. From the first morning, Syndic and rental management use cases diverged significantly. The second workshop agenda was revised at the end of day one, with business participants attending both sessions.

objective_fr: Cartographier des flux comptables cibles indépendamment des outils existants, identifier les fonctionnalités manquantes et cadrer la roadmap IA-centric.
objective_en: Map target accounting flows independent of existing tools, identify missing features, and frame the "AI-centric" product roadmap.
constraints_fr: Interviews utilisateurs refusées · connaissance métier minimale au départ · adaptation du second atelier après le premier jour.
constraints_en: User interviews refused · minimal initial domain knowledge · second workshop adapted after day one.


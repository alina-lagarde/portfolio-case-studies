participants:
  title_fr: Trois phases distinctes, trois panels de participants.
  title_en: Three distinct phases, three participant pools.
  intro_fr: Recrutement via les réseaux sociaux et les acteurs locaux de la rénovation, associations et organismes publics. Qualification via un sondage Tally.
  intro_en: Recruitment via social networks and local renovation stakeholders, including associations and public agencies. Qualification via a Tally survey.
  cards_fr:
    - title: Entretiens exploratoires
      text: 18 sessions individuelles de 30 minutes, à distance via Google Meet. Architectes (6) - Dirigeants / entreprises générales (3) - Artisans (4) - Conducteur de travaux (1) - Commerciaux distribution (3) - AMO (1)
    - title: Ateliers parcours utilisateurs
      text: 13 participants répartis sur 3 sessions collectives de 3 heures sur Miro. Des profils mixtes ont cartographié l'ensemble du cycle de vie d'un projet de rénovation.
    - title: Tests de concepts
      text: "3 focus groups pour évaluer 4 concepts : REX de chantier, diagnostic de faisabilité, outil de chiffrage et guide de mise en oeuvre."
  cards_en:
    - title: Exploratory interviews
      text: 18 individual sessions of 30 minutes, remotely via Google Meet. Architects (6) - Company heads / general contractors (3) - Artisans (4) - Site supervisors (1) - Distribution sales reps (3) - AMO (1)
    - title: User journey workshops
      text: 13 participants across 3 collective sessions of 3 hours each on Miro. Mixed profiles per group mapped against the full renovation project lifecycle.
    - title: Concept testing focus groups
      text: "3 groups testing 4 tool concepts: Site REX, feasibility diagnostic, cost estimation tool and implementation guide."

approach:
  title_fr: Quatre phases adaptées aux réalités de chaque profil.
  title_en: Four phases adapted to each profile's reality.
  title_fr_html: Quatre phases adaptées aux réalités de chaque profil.
  title_en_html: Four phases adapted to each profile's reality.
  intro_fr: "Outils : Miro - Meetgeek - Google Meet - Google Sheets - Google Slides"
  intro_en: "Tools: Miro - Meetgeek - Google Meet - Google Sheets - Google Slides"
  show_tools_line: false
  steps:
    - step: "01"
      title_fr: Recrutement et qualification
      title_en: Recruitment and qualification
      text_fr: Mobilisation via les réseaux sociaux et les acteurs locaux. Qualification et logistique par sondage Tally ; grille de recrutement sous Google Sheets.
      text_en: Outreach via social networks and local renovation actors. Tally survey for logistics and screening; recruitment grid managed in Google Sheets.
    - step: "02"
      title_fr: Entretiens exploratoires
      title_en: Exploratory interviews
      text_fr: 18 entretiens individuels enregistrés et retranscrits via Meetgeek pour cartographier pratiques, irritants, veille et décision.
      text_en: 18 monitored interviews to map practices, pain points, monitoring processes and decision-making patterns; recorded and transcribed via Meetgeek.
    - step: "03"
      title_fr: Ateliers parcours
      title_en: Journey workshops
      text_fr: "3 sessions collectives sur Miro : étapes, points de douleur, frictions entre acteurs et opportunités par profil."
      text_en: 3 collective Miro sessions mapping stages, pain points, cross-actor friction and opportunities across the lifecycle.
    - step: "04"
      title_fr: Tests de concepts
      title_en: Concept testing
      text_fr: "4 concepts évalués en 3 focus groups : compréhension, désirabilité, adéquation aux workflows réels et pistes d'amélioration."
      text_en: 3 focus groups evaluating 4 concepts for comprehension, desirability, real workflow fit and improvement leads.
  tools_fr: Miro - Meetgeek - Google Meet - Google Sheets - Google Slides
  tools_en: Miro - Meetgeek - Google Meet - Google Sheets - Google Slides


takeaway_fr:
  - text: Dans un écosystème métier fragmenté, un outil utile doit parler un langage partagé par toute la chaîne.
    highlight: true
  - text: En rénovation, chaque métier intervient à un moment précis avec son propre vocabulaire et ses contraintes ; sans expert coordinateur, les passages de relais créent des dysfonctionnements structurels. Un outil couvrant toute la chaîne peut faire la différence, à condition de s'interfacer avec les écosystèmes déjà utilisés.
  - html: "<strong>Réflexion.</strong> Le recrutement a été de loin la partie la plus difficile : certains profils ont nécessité 1 à 1,5 mois de mobilisation, malgré l'appui du CSTB. Un enseignement contre-intuitif : réengager les mêmes participants sur plusieurs sessions s'est avéré bien plus facile que recruter de nouveaux profils. À l'avenir, le temps de recrutement doit être budgété séparément et de façon réaliste dans ce secteur."
takeaway_en:
  - text: Tools in fragmented professional ecosystems need a shared language across very different user profiles.
    highlight: true
  - text: In renovation, each trade intervenes at a specific moment with its own vocabulary and constraints. Without a coordinating expert, handoffs between trades generate structural dysfunction. A tool that speaks to the whole chain can make a difference, but only if it interfaces with every existing ecosystem its users already rely on.
  - html: "<strong>Reflection.</strong> Recruitment was by far the hardest part of the mission: specific profiles took 1 to 1.5 months to mobilize despite CSTB's outreach support. One counter-intuitive finding was that re-engaging the same participants across multiple sessions was significantly easier than recruiting fresh profiles. Future proposals in this sector will budget recruitment time separately and realistically."


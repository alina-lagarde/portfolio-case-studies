  before_fr: Le CSTB devait évaluer des outils sans disposer encore d'une vision consolidée des utilisateurs réels, de leurs pratiques et de leurs contraintes.
  before_en: CSTB needed to evaluate tools without yet having a consolidated view of real users, practices and constraints.
  decision_fr: Déployer une recherche en quatre phases, adaptée aux cinq profils professionnels du secteur.
  decision_en: Run a four-phase research strategy adapted to the five professional profiles in the sector.
  effect_fr: La recherche a livré les profils, parcours et concepts testés, puis déclenché une mission complémentaire de tests de prototypes.
  effect_en: The research delivered profiles, journeys and tested concepts, then triggered a follow-up prototype testing mission.
  title_fr: Une recherche prolongée par des tests de prototypes.
  title_en: Research followed by prototype testing.
  title_fr_html: Une recherche prolongée par des tests de prototypes.
  title_en_html: Research followed by prototype testing.
  paragraphs_fr:

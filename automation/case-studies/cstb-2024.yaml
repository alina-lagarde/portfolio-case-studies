results:
  title_fr: Une recherche prolongée par des tests de prototypes.
  title_en: Research followed by prototype testing.
  title_fr_html: Une recherche prolongée par des tests de prototypes.
  title_en_html: Research followed by prototype testing.
  blocks_fr:
    - title: Livrable
      text: 5 profils consolidés et leur écosystème - 3 parcours détaillés couvrant conception, chiffrage et exécution - 4 concepts testés avec verbatims et recommandations de redesign - synthèse complète livrée au CSTB.
    - title: Impact
      text: "La recherche a directement déclenché une mission de tests complémentaire. Deux prototypes ont été validés avec des utilisateurs : un diagnostic de faisabilité, sous forme de quiz guidé simulant une évaluation professionnelle avec un propriétaire, et un module de reconnaissance architecturale identifiant la typologie du bâti par géolocalisation et forme."
    - title: Point de vigilance
      text: Plusieurs autres outils, dont un estimateur financier, ont été développés et livrés sans tests utilisateurs.
  blocks_en:
    - title: Deliverable
      text: 5 consolidated user profiles and their stakeholder ecosystem - 3 detailed user journeys covering design, cost estimation and execution - 4 concepts tested with verbatims and redesign recommendations - full synthesis delivered to CSTB.
    - title: Impact
      text: "The research directly triggered a follow-up testing mission. Two prototypes were validated with users: a feasibility diagnostic tool, a guided quiz simulating a professional site assessment with a homeowner, and an architectural recognition module identifying building typology from geolocation and shape."
    - title: Point of attention
      text: Several other tools, including a financial estimator, were developed and shipped without user testing.


context:
  title_fr: Qui utilise réellement ces outils, et de quoi a-t-il besoin ?
  title_en: Who are the real users, and what do they actually need?
  title_fr_html: Qui utilise réellement ces outils,<br>et de quoi a-t-il besoin ?
  title_en_html: Who are the real users,<br>and what do they actually need?
  paragraphs_fr:
    - Dans le cadre du programme RESTORE, le CSTB devait évaluer la réplicabilité technique, géographique et commerciale d'outils numériques conçus pour la rénovation énergétique de maisons individuelles.
    - "Avant de pouvoir évaluer un outil, une question fondatrice devait être résolue : qui sont les utilisateurs réels, comment travaillent-ils et de quoi ont-ils effectivement besoin ?"
    - "Le périmètre couvrait cinq profils professionnels distincts de la chaîne de rénovation : architectes, artisans, assistants à maîtrise d'ouvrage (AMO), dirigeants d'entreprise et distributeurs. Chacun travaillait dans un contexte radicalement différent, avec ses propres processus, modes de décision et irritants."
  paragraphs_en:
    - Within the RESTORE programme, the CSTB needed to evaluate the technical, geographic, and commercial replicability of digital tools designed for the energy renovation of individual homes.
    - "Before any tool could be assessed, a foundational question had to be answered: who are the real users, how do they work, and what do they actually need?"
    - The scope covered five distinct professional profiles across the renovation chain - architects, artisans, project managers (AMO), company heads, and distributors - each operating in radically different contexts, with different processes, decision-making patterns, and pain points.
  challenge_fr: >-
    Concevoir une recherche couvrant cinq profils avec des modèles mentaux, vocabulaires
    et façons de travailler très différents : de l'artisan indépendant au manager de
    distribution d'une grande enseigne. Un protocole unique ne pouvait pas convenir à tous.
    Chaque phase devait être adaptée par profil, du recrutement à la structure des ateliers,
    dans un secteur fragmenté par des aides changeantes, des compétences variables et une
    défiance profonde entre acteurs : MAR, artisans et architectes.
  challenge_en: >-
    The mission required designing research across five professional profiles with
    fundamentally different mental models, vocabularies, and ways of working - from solo
    artisans to distribution managers at major retail chains. A single protocol could not
    cover all of them. Every phase required adaptation by profile, from recruitment strategy
    to workshop structure, in a sector shaped by changing regulatory aids, uneven competencies
    and deep distrust between stakeholders: MAR, artisans and architects.

objective_fr: Identifier et analyser les pratiques, besoins et contraintes de professionnels de la rénovation sur 5 profils. Tester 4 concepts d'outils face à leurs workflows réels.
objective_en: Identify and analyze the practices, needs and constraints of renovation professionals across 5 profiles. Test 4 tool concepts against their real workflows.
constraints_fr: Secteur fragmenté · profils hétérogènes · recrutement difficile · protocoles à adapter par profil.
constraints_en: Fragmented sector · heterogeneous profiles · difficult recruitment · protocols adapted by profile.

